{% extends 'index.html' %}
{% block content %}	
<div class="uk-child-width-1@m uk-child-width-1@s uk-text-left" uk-grid>
<article class="uk-article">
    <h1 class="uk-article-title"><a class="uk-link-reset" href="">{{ work.title }}</a></h1>
    <p class="uk-text-lead">{{ work.summary }}</p>
    <hr/>

    {% include "chapter.html" %}

    <a href="{{ next_chapter }}">Next Chapter</a>

    <div class="uk-grid-small uk-child-width-auto" uk-grid>
        <div>
            <a class="uk-button uk-button-text" href="#">Read more</a>
        </div>
        <div>
            <a class="uk-button uk-button-text" href="#">5 Comments</a>
        </div>
    </div>
</article>
</div>
{% endblock %}
