{% extends 'index.html' %}
{% block content %}	
<div class="uk-child-width-1@m uk-child-width-1@s uk-text-left" uk-grid>
	<form class="uk-form"  method="post" id="commentForm">
		{% csrf_token %}
		<fieldset class="uk-fieldset">
		<div class="uk-margin">
            <label class="uk-form-label" for="form-horizontal-text">Edit Comment</label>
            <div class="uk-form-controls">
                <div class="uk-inline">
                    <textarea class="uk-textarea uk-form-width-large" rows="5" placeholder="Text" name="text">{{ comment.text }}</textarea>

                </div>
            </div>
            
        </div>
        <div class="uk-text-left uk-width-1">
	            <input class="uk-button uk-button-default" type="submit" value="Submit"/>
	    </div>
    </fieldset>
	</form>
</div>
{% endblock %}
